<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聖書Q&Aアシスタント</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #f8f4ec 0%, #ede8dc 100%);
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    background: linear-gradient(135deg, #3d2b1f, #6b4c2a);
    padding: 20px 24px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(61,43,31,0.3);
  }
  header .icon { font-size: 2rem; margin-bottom: 4px; }
  header h1 {
    color: #f5e6c8;
    font-size: clamp(1.2rem, 5vw, 1.8rem);
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  header p { color: #c8a87a; font-size: 0.8rem; margin-top: 4px; letter-spacing: 0.08em; }

  /* API Key setup */
  #setup {
    width: 100%;
    max-width: 600px;
    margin: 30px 16px;
    background: #fff;
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 2px 16px rgba(61,43,31,0.12);
    border: 1px solid #e0d0b8;
  }
  #setup h2 { color: #3d2b1f; font-size: 1.1rem; margin-bottom: 12px; }
  #setup p { color: #7a5a3a; font-size: 0.85rem; line-height: 1.7; margin-bottom: 16px; }
  #setup a { color: #6b4c2a; }
  #setup input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #d4c0a0;
    border-radius: 10px;
    font-size: 0.9rem;
    color: #3a2518;
    background: #faf6ef;
    margin-bottom: 12px;
    font-family: monospace;
  }
  #setup input:focus { outline: none; border-color: #a0856a; box-shadow: 0 0 0 3px rgba(160,133,106,0.15); }
  #setup button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #3d2b1f, #6b4c2a);
    color: #f5e6c8;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    font-family: 'Hiragino Mincho ProN', Georgia, serif;
    letter-spacing: 0.05em;
  }
  #setup button:hover { opacity: 0.9; }

  /* Chat */
  #chat-container {
    display: none;
    flex-direction: column;
    width: 100%;
    max-width: 720px;
    flex: 1;
  }
  #messages {
    flex: 1;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 60vh;
  }
  .welcome {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 12px rgba(61,43,31,0.1);
    border: 1px solid #e0d0b8;
    text-align: center;
    margin-bottom: 8px;
  }
  .welcome h2 { color: #5a3e2b; font-size: 1rem; margin-bottom: 8px; }
  .welcome p { color: #8a6a50; font-size: 0.85rem; line-height: 1.7; }
  .suggest-label { color: #8a6a50; font-size: 0.8rem; text-align: center; margin-bottom: 8px; }
  .suggestions { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
  .suggest-btn {
    background: #faf6ef;
    border: 1px solid #d4c0a0;
    border-radius: 10px;
    padding: 10px 16px;
    cursor: pointer;
    text-align: left;
    color: #4a3220;
    font-size: 0.88rem;
    font-family: 'Hiragino Mincho ProN', Georgia, serif;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .suggest-btn:hover { background: #e8dcc8; border-color: #a0856a; }
  .msg-row { display: flex; align-items: flex-start; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }
  .avatar {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #3d2b1f, #6b4c2a);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    margin-right: 10px;
    margin-top: 4px;
    box-shadow: 0 2px 8px rgba(61,43,31,0.3);
  }
  .bubble {
    max-width: 85%;
    padding: 14px 18px;
    font-size: 0.92rem;
    line-height: 1.8;
    box-shadow: 0 2px 10px rgba(61,43,31,0.12);
    white-space: pre-wrap;
    font-family: 'Hiragino Mincho ProN', Georgia, serif;
  }
  .bubble.user {
    background: linear-gradient(135deg, #6b4c2a, #3d2b1f);
    color: #f5e6c8;
    border-radius: 18px 18px 4px 18px;
  }
  .bubble.assistant {
    background: #fff;
    color: #3a2518;
    border-radius: 18px 18px 18px 4px;
    border: 1px solid #e0d0b8;
  }
  .typing {
    display: flex; gap: 6px; align-items: center;
    padding: 14px 20px;
    background: #fff;
    border-radius: 18px 18px 18px 4px;
    border: 1px solid #e0d0b8;
    box-shadow: 0 2px 10px rgba(61,43,31,0.12);
  }
  .dot {
    width: 8px; height: 8px;
    background: #a0856a;
    border-radius: 50%;
    animation: blink 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* Input */
  #input-area {
    width: 100%;
    max-width: 720px;
    padding: 12px 16px 24px;
    position: sticky;
    bottom: 0;
    background: linear-gradient(to top, #ede8dc 80%, transparent);
  }
  .input-box {
    display: flex;
    gap: 10px;
    background: #fff;
    border-radius: 16px;
    padding: 10px 10px 10px 16px;
    box-shadow: 0 4px 20px rgba(61,43,31,0.15);
    border: 1px solid #d4c0a0;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    border: none;
    resize: none;
    background: transparent;
    color: #3a2518;
    font-size: 0.92rem;
    font-family: 'Hiragino Mincho ProN', Georgia, serif;
    line-height: 1.6;
    max-height: 120px;
    overflow: auto;
    padding: 4px 0;
  }
  textarea:focus { outline: none; }
  #send-btn {
    background: #3d2b1f;
    border: none;
    border-radius: 12px;
    width: 42px; height: 42px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: #6b4c2a; }
  #send-btn:disabled { background: #c8b89a; cursor: not-allowed; }
  .footer-note {
    text-align: center;
    font-size: 0.7rem;
    color: #a8906a;
    margin-top: 8px;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .fade-up { animation: fadeUp 0.3s ease forwards; }
</style>
</head>
<body>

<header>
  <div class="icon">✝️</div>
  <h1>聖書Q&Aアシスタント</h1>
  <p>日本同盟基督教団の信仰に基づく</p>
</header>

<!-- API Key Setup -->
<div id="setup">
  <h2>🔑 APIキーを入力してください</h2>
  <p>
    このアプリはAnthropicのAI（Claude）を使って聖書の質問に答えます。<br>
    APIキーは <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> で無料取得できます。<br>
    キーはあなたのブラウザ内にのみ保存され、外部には送信されません。
  </p>
  <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." />
  <button onclick="startApp()">✝️ はじめる</button>
</div>

<!-- Chat UI -->
<div id="chat-container">
  <div id="messages">
    <div class="welcome fade-up">
      <h2>聖書について、何でも聞いてください</h2>
      <p>日本同盟基督教団の福音主義的立場から、<br>聖書のみことばに基づいてお答えします。</p>
    </div>
    <p class="suggest-label">よくある質問：</p>
    <div class="suggestions" id="suggestions"></div>
  </div>
  <div id="input-area">
    <div class="input-box">
      <textarea id="user-input" placeholder="聖書について質問してください…" rows="1"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"
        onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()">🕊️</button>
    </div>
    <p class="footer-note">Enterで送信 • AIの回答は参考情報です。信仰の判断は牧師・教会にご相談ください。</p>
  </div>
</div>

<script>
const SUGGESTIONS = [
  "救いとは何ですか？どうすれば救われますか？",
  "聖書はなぜ信頼できるのですか？",
  "祈りとは何ですか？どう祈ればいいですか？",
  "イエス・キリストとはどんな方ですか？",
  "聖霊の働きについて教えてください",
  "天国と地獄はありますか？",
  "苦しみの中で神はどこにいるのですか？",
  "クリスチャンとして日常生活をどう生きるべきですか？",
];

const SYSTEM_PROMPT = `あなたは日本同盟基督教団（JECA）の信仰と神学に基づいて聖書の質問に答えるアシスタントです。

【日本同盟基督教団の基本的な立場】
- 聖書は神の霊感による無謬の神のことば（聖書信仰・聖書の完全霊感）
- 三位一体の神：父・子・聖霊
- イエス・キリストの神性、処女降誕、代替贖罪、肉体的復活、再臨
- 信仰のみによる救い（恵みによる救済）
- 聖霊による新生と聖化
- 福音伝道と宣教への使命
- 福音主義・福音派プロテスタントの立場
- キリストの再臨と終末論（前千年王国的な立場を重視）
- 地域教会の重要性と信者のバプテスマ

【回答スタイル】
- 聖書箇所を具体的に示して根拠を示す（書名・章・節）
- 温かく、牧会的なトーンで答える
- 難しい神学用語は分かりやすく説明する
- 確信をもって、しかし謙虚に答える
- 日本語で答える`;

let apiKey = '';
let messages = [];
let loading = false;

function startApp() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key.startsWith('sk-')) {
    alert('APIキーが正しくないようです。「sk-」で始まるキーを入力してください。');
    return;
  }
  apiKey = key;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('chat-container').style.display = 'flex';

  const sug = document.getElementById('suggestions');
  SUGGESTIONS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'suggest-btn';
    btn.textContent = '📖 ' + s;
    btn.onclick = () => sendMessage(s);
    sug.appendChild(btn);
  });
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function appendMessage(role, content) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role} fade-up`;

  if (role === 'assistant') {
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '✝️';
    row.appendChild(avatar);
  }

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.textContent = content;
  row.appendChild(bubble);
  msgs.appendChild(row);
  row.scrollIntoView({ behavior: 'smooth' });
  return bubble;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row assistant fade-up';
  row.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '✝️';
  row.appendChild(avatar);

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(typing);
  msgs.appendChild(row);
  row.scrollIntoView({ behavior: 'smooth' });
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage(text) {
  const input = document.getElementById('user-input');
  const question = text || input.value.trim();
  if (!question || loading) return;
  input.value = '';
  input.style.height = 'auto';

  // Hide suggestions
  document.getElementById('suggestions').style.display = 'none';
  document.querySelector('.suggest-label') && (document.querySelector('.suggest-label').style.display = 'none');

  appendMessage('user', question);
  messages.push({ role: 'user', content: question });

  loading = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages,
      }),
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'エラーが発生しました。もう一度お試しください。';
    hideTyping();
    appendMessage('assistant', reply);
    messages.push({ role: 'assistant', content: reply });
  } catch (e) {
    hideTyping();
    appendMessage('assistant', 'エラーが発生しました。APIキーを確認してもう一度お試しください。');
  }

  loading = false;
  document.getElementById('send-btn').disabled = false;
}
</script>
</body>
</html>
